<!DOCTYPE html>
<html>
<head>
    <title>Smart Farming Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #a8e6cf, #dcedc1);
            text-align: center;
        }

        h1 {
            margin-top: 30px;
            color: #2e7d32;
        }

        .card {
            background: white;
            width: 220px;
            display: inline-block;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        button {
            background: #43a047;
            color: white;
            border: none;
            padding: 10px;
            width: 130px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #2e7d32;
        }

        .logout {
            position: absolute;
            top: 20px;
            right: 20px;
            background: red;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 5px;
        }

    </style>

</head>
<body>

    <a class="logout" href="/logout">Logout</a>

    <h1>🌱 Smart Farming Dashboard</h1>

    <div class="card">
        <h3>🌦 Weather</h3>
        <a href="/weather"><button>Open</button></a>
    </div>

    <div class="card">
        <h3>👨‍🌾 Add Farmer</h3>
        <a href="/farmer"><button>Open</button></a>
    </div>

    <div class="card">
        <h3>📋 Farmers List</h3>
        <a href="/farmers"><button>Open</button></a>
    </div>

    <div class="card">
        <h3>📊 Statistics</h3>
        <a href="/stats"><button>Open</button></a>
    </div>

</body>
</html>
