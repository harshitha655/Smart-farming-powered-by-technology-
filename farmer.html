<!DOCTYPE html>
<html>
<head>
    <title>Farmer Registration</title>
</head>
<body>

    <h1>👨‍🌾 Farmer Registration Form</h1>

    <form action="/add_farmer" method="POST">

        <label>Name:</label><br>
        <input type="text" name="name" placeholder="Enter farmer name" required>
        <br><br>

        <label>Village:</label><br>
        <input type="text" name="village" placeholder="Enter village name" required>
        <br><br>

        <label>Crop:</label><br>
        <input type="text" name="crop" placeholder="Enter crop name" required>
        <br><br>

        <button type="submit">🌾 Add Farmer</button>

    </form>

    <br>
    <a href="/farmers">👉 View Farmers List</a>

</body>
</html>
